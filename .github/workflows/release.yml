name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (semver, e.g. 0.1.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Version must be semver format (e.g. 0.1.0)"
            exit 1
          fi

      - name: Update manifest.json
        run: |
          sed -i 's/"version": ".*"/"version": "${{ github.event.inputs.version }}"/' custom_components/flatastic/manifest.json

      - name: Update const.py
        run: |
          sed -i 's/VERSION = ".*"/VERSION = "${{ github.event.inputs.version }}"/' custom_components/flatastic/const.py

      - name: Update CHANGELOG.md
        run: |
          DATE=$(date +"%Y-%m-%d")
          VERSION="${{ github.event.inputs.version }}"
          temp_file=$(mktemp)
          head -n 6 CHANGELOG.md > "$temp_file"
          echo "" >> "$temp_file"
          echo "## [$VERSION] - $DATE" >> "$temp_file"
          echo "" >> "$temp_file"
          echo "### Changed" >> "$temp_file"
          echo "- Release $VERSION" >> "$temp_file"
          echo "" >> "$temp_file"
          tail -n +7 CHANGELOG.md >> "$temp_file"
          mv "$temp_file" CHANGELOG.md

      - name: Commit and tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/flatastic/manifest.json custom_components/flatastic/const.py CHANGELOG.md
          git commit -m "Release version $VERSION"
          git tag -a "v$VERSION" -m "Release version $VERSION"
          git push origin main
          git push origin "v$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes
