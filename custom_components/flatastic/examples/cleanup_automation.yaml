# Example automation to regularly clean up orphaned Flatastic entities
# Add this to your Home Assistant automations.yaml or create it via the UI

- id: flatastic_cleanup_orphaned_entities
  alias: "Flatastic: Cleanup Orphaned Entities"
  description: "Regularly clean up sensor entities for chores that no longer exist in Flatastic"
  trigger:
    # Run daily at 3 AM
    - platform: time
      at: "03:00:00"
    # Also run when Home Assistant starts (after 5 minutes to let everything initialize)
    - platform: homeassistant
      event: start
      for:
        minutes: 5
  condition: []
  action:
    - service: flatastic.cleanup_orphaned_entities
      data: {}
  mode: single

